<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修動画ライブラリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --primary-light: #e8f0fe;
      --success: #34a853;
      --text: #202124;
      --text-sub: #5f6368;
      --border: #e0e0e0;
      --bg: #f8f9fa;
      --card: #ffffff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.14);
    }
    body { font-family: 'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--primary);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon { font-size: 24px; }
    header h1 { font-size: 17px; font-weight: 600; }
    .admin-link {
      color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px;
      padding: 6px 14px; border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px; transition: all 0.2s;
    }
    .admin-link:hover { background: rgba(255,255,255,0.15); color: white; }

    .hero {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white; padding: 44px 24px 40px; text-align: center;
    }
    .hero h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .hero p { font-size: 14px; opacity: 0.88; line-height: 1.7; max-width: 460px; margin: 0 auto; }
    .stats { display: flex; justify-content: center; gap: 40px; margin-top: 28px; }
    .stat-num { font-size: 26px; font-weight: 700; }
    .stat-label { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

    .card {
      background: var(--card); border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow); transition: all 0.25s ease;
      text-decoration: none; color: inherit; display: block;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    .card-thumb {
      height: 136px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .card-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.12), transparent 60%);
    }
    .play-btn {
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.22); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(255,255,255,0.5); font-size: 20px;
      transition: all 0.2s; position: relative; z-index: 1;
    }
    .card:hover .play-btn { background: rgba(255,255,255,0.38); transform: scale(1.1); }

    .card-body { padding: 16px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-blue { background: var(--primary-light); color: var(--primary); }
    .badge-green { background: #e6f4ea; color: var(--success); }
    .card-date { font-size: 11px; color: var(--text-sub); margin-left: auto; }

    .empty-state { text-align: center; padding: 64px 24px; color: var(--text-sub); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.35; }
    .empty-state h3 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .loading { text-align: center; padding: 64px; color: var(--text-sub); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-sub); border-top: 1px solid var(--border); margin-top: 16px; }

    @media(max-width:600px) {
      .hero h2 { font-size: 20px; }
      .stats { gap: 24px; }
      .stat-num { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-icon">🎓</span>
    <h1>研修動画ライブラリ</h1>
  </div>
  <a href="admin.html" class="admin-link">管理者</a>
</header>

<div class="hero">
  <h2>介護・医療 研修動画</h2>
  <p>動画を見ながらテキストで内容を確認できます。<br>Chrome翻訳で母国語に変換して学習できます。</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="videoCount">—</div>
      <div class="stat-label">動画数</div>
    </div>
    <div class="stat">
      <div class="stat-num">無料</div>
      <div class="stat-label">利用料金</div>
    </div>
    <div class="stat">
      <div class="stat-num">10+</div>
      <div class="stat-label">対応言語</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="section-title">動画一覧</div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>
  </div>
</div>

<footer>研修動画ライブラリ — Chrome翻訳対応</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC9zXV4wozwYh0T1CtA6P-02CA4Rr9EFOM",
    authDomain: "kenshu-videos-app.firebaseapp.com",
    projectId: "kenshu-videos-app",
    storageBucket: "kenshu-videos-app.firebasestorage.app",
    messagingSenderId: "598974487316",
    appId: "1:598974487316:web:eef152f165495be79a0001"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadVideos() {
    const content = document.getElementById('content');
    try {
      const q = query(collection(db,'videos'), where('status','==','published'), orderBy('createdAt','desc'));
      const snapshot = await getDocs(q);
      const videos = [];
      snapshot.forEach(doc => videos.push({ id: doc.id, ...doc.data() }));
      document.getElementById('videoCount').textContent = videos.length;

      if (videos.length === 0) {
        content.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><h3>動画がまだありません</h3><p>管理者が動画を追加するとここに表示されます。</p></div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'grid';
      videos.forEach(v => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = `video.html?id=${v.id}`;
        const date = v.createdAt?.toDate?.()?.toLocaleDateString('ja-JP') || '';
        a.innerHTML = `
          <div class="card-thumb"><div class="play-btn">▶</div></div>
          <div class="card-body">
            <div class="card-title">${v.title}</div>
            <div class="card-meta">
              <span class="badge badge-blue">📄 テキストあり</span>
              ${v.textEasy ? '<span class="badge badge-green">✨ やさしい日本語</span>' : ''}
              <span class="card-date">${date}</span>
            </div>
          </div>`;
        grid.appendChild(a);
      });
      content.innerHTML = '';
      content.appendChild(grid);
    } catch(e) {
      content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Firebase設定が必要です</h3><p>管理者に連絡してください。</p></div>`;
    }
  }
  loadVideos();
</script>
</body>
</html>

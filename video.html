<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修動画</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --primary-light: #e8f0fe;
      --success: #34a853;
      --success-light: #e6f4ea;
      --warning: #f9ab00;
      --text: #202124;
      --text-sub: #5f6368;
      --border: #e0e0e0;
      --bg: #f8f9fa;
      --card: #ffffff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body { font-family: 'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--primary); color: white;
      padding: 0 20px; height: 60px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      color: rgba(255,255,255,0.85); text-decoration: none;
      font-size: 20px; padding: 6px; border-radius: 50%;
      transition: background 0.2s; line-height: 1;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    .header-title { font-size: 16px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .container { max-width: 840px; margin: 0 auto; padding: 20px 16px 40px; }

    .video-wrap {
      background: #000; border-radius: 14px; overflow: hidden;
      margin-bottom: 20px; position: relative; padding-top: 56.25%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .text-card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }

    .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 14px 16px; text-align: center;
      font-size: 14px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; border: none; background: none;
      transition: all 0.2s; position: relative;
    }
    .tab.active { color: var(--primary); }
    .tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px; background: var(--primary); border-radius: 2px 2px 0 0;
    }
    .tab:hover:not(.active) { background: var(--bg); }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    .easy-label {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--success-light); color: var(--success);
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; margin-bottom: 14px;
    }

    .text-body {
      font-size: 15px; line-height: 1.9; color: var(--text);
      white-space: pre-wrap;
    }

    .action-bar { display: flex; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: white; color: var(--text-sub); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-speak { background: var(--success); color: white; }
    .btn-speak:hover { background: #2d9247; }
    .btn-speak.speaking { background: var(--warning); }
    .btn-stop { background: white; color: var(--danger, #d93025); border: 1px solid #fad4d2; }
    .btn-stop:hover { background: #fce8e6; }

    .speed-control {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px; background: white;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; color: var(--text-sub);
    }
    .speed-control select {
      border: none; background: none; font-size: 13px;
      font-weight: 600; color: var(--text); cursor: pointer; outline: none;
    }
    .voice-bar {
      padding: 10px 20px 0; display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-sub);
    }
    .voice-bar select {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; color: var(--text);
      background: white; outline: none; cursor: pointer; max-width: 360px;
    }

    .loading-state { padding: 48px; text-align: center; color: var(--text-sub); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .not-found { text-align: center; padding: 80px 24px; color: var(--text-sub); }
    .not-found .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.35; }

    @media(max-width:600px) {
      .action-bar { flex-direction: column; }
      .btn, .speed-control { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div class="header-title" id="headerTitle">読み込み中...</div>
</header>

<div class="container">
  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC9zXV4wozwYh0T1CtA6P-02CA4Rr9EFOM",
    authDomain: "kenshu-videos-app.firebaseapp.com",
    projectId: "kenshu-videos-app",
    storageBucket: "kenshu-videos-app.firebasestorage.app",
    messagingSenderId: "598974487316",
    appId: "1:598974487316:web:eef152f165495be79a0001"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(location.search);
  const videoId = params.get('id');

  async function load() {
    const content = document.getElementById('content');
    if (!videoId) { showNotFound(content); return; }
    try {
      const snap = await getDoc(doc(db, 'videos', videoId));
      if (!snap.exists()) { showNotFound(content); return; }
      const v = snap.data();
      document.getElementById('headerTitle').textContent = v.title;
      document.title = v.title + ' — 研修動画';

      const hasEasy = !!v.textEasy;
      content.innerHTML = `
        <div class="video-wrap">
          <iframe src="https://drive.google.com/file/d/${v.driveFileId}/preview" allow="autoplay" allowfullscreen></iframe>
        </div>
        <div class="text-card">
          <div class="voice-bar">
            🗣 声：
            <select id="voiceSelect" onchange="updateRate()">
              <option value="">読み込み中...</option>
            </select>
          </div>
          <div class="tab-bar">
            <button class="tab active" data-tab="plain">📄 原文テキスト</button>
            ${hasEasy ? '<button class="tab" data-tab="easy">✨ やさしい日本語</button>' : ''}
          </div>
          <div class="tab-content active" id="tab-plain">
            <div class="action-bar">
              <button class="btn btn-speak" id="speak-plain" onclick="speakText('plain')">🔊 読み上げ</button>
              <button class="btn btn-stop" onclick="stopSpeak()">⏸ 停止</button>
              <div class="speed-control">
                速度
                <select id="rate-plain" onchange="updateRate()">
                  <option value="0.7">0.7×</option>
                  <option value="0.85">0.85×</option>
                  <option value="1" selected>1×</option>
                  <option value="1.2">1.2×</option>
                  <option value="1.5">1.5×</option>
                </select>
              </div>
              <button class="btn btn-outline" onclick="copyText('plain')">📋 コピー</button>
            </div>
            <div class="text-body" id="text-plain">${escHtml(v.textPlain || '（テキストなし）')}</div>
          </div>
          ${hasEasy ? `
          <div class="tab-content" id="tab-easy">
            <div class="easy-label">✨ やさしい日本語版</div>
            <div class="action-bar">
              <button class="btn btn-speak" id="speak-easy" onclick="speakText('easy')">🔊 読み上げ</button>
              <button class="btn btn-stop" onclick="stopSpeak()">⏸ 停止</button>
              <div class="speed-control">
                速度
                <select id="rate-easy" onchange="updateRate()">
                  <option value="0.7">0.7×</option>
                  <option value="0.85">0.85×</option>
                  <option value="1" selected>1×</option>
                  <option value="1.2">1.2×</option>
                  <option value="1.5">1.5×</option>
                </select>
              </div>
              <button class="btn btn-outline" onclick="copyText('easy')">📋 コピー</button>
            </div>
            <div class="text-body" id="text-easy">${escHtml(v.textEasy)}</div>
          </div>` : ''}
        </div>`;

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          stopSpeak();
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });

      window._videoData = v;
      // コンテンツ生成後に声リストを読み込む
      setTimeout(loadVoices, 100);
    } catch(e) {
      content.innerHTML = `<div class="not-found"><div class="icon">⚠️</div><p>読み込みエラーが発生しました。</p></div>`;
    }
  }

  function showNotFound(content) {
    content.innerHTML = `<div class="not-found"><div class="icon">🎬</div><p>動画が見つかりませんでした。</p><br><a href="index.html">一覧に戻る</a></div>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.copyText = function(type) {
    const text = type === 'easy' ? window._videoData?.textEasy : window._videoData?.textPlain;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = '✅ コピーしました';
      setTimeout(() => { btn.textContent = original; }, 2000);
    });
  };

  // ---------- 声リスト読み込み ----------
  function loadVoices() {
    const sel = document.getElementById('voiceSelect');
    if (!sel) return;
    const allVoices = window.speechSynthesis.getVoices();
    if (allVoices.length === 0) return;

    // クラウド音声は再生失敗が多いためローカル音声のみに絞る
    const voices = allVoices.filter(v => v.localService);

    // ページの現在の言語（Chrome翻訳後も反映）
    const pageLang = document.documentElement.lang?.split('-')[0] || 'ja';

    sel.innerHTML = '';

    // ①現在のページ言語の声、②日本語の声、③その他 の順で表示
    const groups = {};
    voices.forEach(v => {
      const lang = v.lang.split('-')[0];
      if (!groups[lang]) groups[lang] = [];
      groups[lang].push(v);
    });

    const langOrder = [pageLang, 'ja', ...Object.keys(groups).filter(l => l !== pageLang && l !== 'ja')];
    const langNames = { ja: '日本語', en: '英語', id: 'インドネシア語', vi: 'ベトナム語', my: 'ミャンマー語', ko: '韓国語', zh: '中国語' };

    // 良質な音声の優先名
    const preferred = ['Nanami', 'Kenji', 'Andika', 'An ', 'Heami'];

    let bestMatch = null; // ページ言語に合う最良の声
    let firstInPageLang = null; // ページ言語の最初の声
    let firstOpt = null; // リストの最初の声

    langOrder.forEach(lang => {
      const group = groups[lang];
      if (!group) return;
      const grp = document.createElement('optgroup');
      grp.label = langNames[lang] || lang.toUpperCase();
      group.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = v.name;
        if (!firstOpt) firstOpt = opt;
        // ページ言語に合う声を優先記録
        if (lang === pageLang) {
          if (!firstInPageLang) firstInPageLang = opt;
          if (!bestMatch && preferred.some(p => v.name.includes(p))) bestMatch = opt;
        }
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    });

    // ページ言語の良質な声 > ページ言語の最初の声 > リスト先頭
    const toSelect = bestMatch || firstInPageLang || firstOpt;
    if (toSelect) toSelect.selected = true;
  }

  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  // Chrome翻訳でページ言語が変わったら声リストも更新
  let lastLang = document.documentElement.lang;
  setInterval(() => {
    const cur = document.documentElement.lang;
    if (cur !== lastLang) {
      lastLang = cur;
      loadVoices();
    }
  }, 1500);

  // ---------- 読み上げ機能 ----------
  let currentUtter = null;
  let currentBtn = null;
  let currentType = null;

  window.speakText = function(type) {
    if (!('speechSynthesis' in window)) {
      alert('お使いのブラウザは読み上げ機能に対応していません。');
      return;
    }
    console.log('speakText called:', type);
    // 再生中の場合のみキャンセル（不要なcancelで"interrupted"エラーが出るのを防ぐ）
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
    }
    if (currentBtn) {
      currentBtn.classList.remove('speaking');
      currentBtn.textContent = '🔊 読み上げ';
      currentBtn = null;
    }
    currentUtter = null;
    currentType = null;

    const el = document.getElementById('text-' + type);
    const text = el?.innerText || '';
    if (!text.trim()) return;

    const btn = document.getElementById('speak-' + type);
    const rate = parseFloat(document.getElementById('rate-' + type)?.value || '1');

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = rate;
    utter.pitch = 1;
    utter.volume = 1;

    // 選択した声をセット
    const voices = window.speechSynthesis.getVoices();
    const voiceName = document.getElementById('voiceSelect')?.value;
    const selectedVoice = voices.find(v => v.name === voiceName);
    if (selectedVoice) {
      utter.voice = selectedVoice;
      utter.lang = selectedVoice.lang;
    } else {
      // 声が未選択の場合、ページ言語に合う声を自動選択
      const pageLang = document.documentElement.lang?.split('-')[0] || 'ja';
      const autoVoice = voices.find(v => v.lang.startsWith(pageLang))
                     || voices.find(v => v.lang.startsWith('ja'));
      if (autoVoice) {
        utter.voice = autoVoice;
        utter.lang = autoVoice.lang;
      } else {
        utter.lang = pageLang;
      }
    }

    utter.onstart = () => {
      btn.classList.add('speaking');
      btn.textContent = '🔊 読み上げ中...';
    };
    utter.onend = () => {
      btn.classList.remove('speaking');
      btn.textContent = '🔊 読み上げ';
      currentUtter = null; currentBtn = null; currentType = null;
    };
    utter.onerror = (e) => {
      btn.classList.remove('speaking');
      btn.textContent = '🔊 読み上げ';
      console.error('TTS error:', e);
    };

    currentUtter = utter;
    currentBtn = btn;
    currentType = type;
    console.log('Speaking with voice:', utter.voice?.name, 'lang:', utter.lang);
    window.speechSynthesis.speak(utter);
  };

  window.stopSpeak = function() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    if (currentBtn) {
      currentBtn.classList.remove('speaking');
      currentBtn.textContent = '🔊 読み上げ';
      currentBtn = null;
    }
    currentUtter = null;
    currentType = null;
  };

  window.updateRate = function() {
    if (currentType && window.speechSynthesis.speaking) {
      const t = currentType;
      stopSpeak();
      speakText(t);
    }
  };

  load();
</script>
</body>
</html>
